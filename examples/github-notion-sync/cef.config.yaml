agentServicePubKey: "0x..."

engagements:
  - name: "Execution Log Concierge"
    description: "Orchestrates PR analysis and Notion logging"
    file: ./engagements/concierge.ts
    version: "1.0.0"

agents:
  - name: "PR Analysis"
    alias: "prAnalysisAgent"
    description: "LLM-based PR analysis and classification"
    version: "1.0.0"
    tasks:
      - name: "Analyze"
        alias: "analyze"
        file: ./agents/pr-analysis/tasks/analyze.ts
        parameters:
          properties:
            pr_data:
              type: object
            cid:
              type: string
            callId:
              type: string
          required:
            - pr_data
          type: object
        returns:
          properties:
            should_log:
              type: boolean
            summary:
              type: string
            category:
              type: string
          type: object

  - name: "Notion"
    alias: "notionAgent"
    description: "Read and write Notion pages"
    version: "1.0.0"
    tasks:
      - name: "Write Entry"
        alias: "writeEntry"
        file: ./agents/notion/tasks/write-entry.ts
        parameters:
          properties:
            notion_page_id:
              type: string
            notion_api_key:
              type: string
            activity:
              type: object
            cid:
              type: string
          required:
            - notion_page_id
            - notion_api_key
            - activity
          type: object
        returns:
          properties:
            toggle_id:
              type: string
            week:
              type: string
          type: object
      - name: "Read Page"
        alias: "readPage"
        file: ./agents/notion/tasks/read-page.ts
        parameters:
          properties:
            notion_page_id:
              type: string
            notion_api_key:
              type: string
          required:
            - notion_page_id
            - notion_api_key
          type: object
        returns:
          properties:
            blocks:
              type: array
          type: object

cubbies:
  - name: "executionLog"
    description: "Deduplication store for processed PR events"
    dataTypes:
      - json

workspaces:
  - name: "DevOps"
    description: "Development operations workspace"
    streams:
      - name: "GitHub Events"
        description: "PR and commit events from GitHub"
        selectors:
          - name: "prEvents"
            conditions:
              - "event_type:pull_request"
        deployments:
          - name: "PR Logger"
            description: "Log significant PRs to Notion"
            engagement: "Execution Log Concierge"
            isActive: true
            triggers:
              - name: "all-events"
                conditions:
                  - "*"
