# Data Sync Template
# Use when: the goal involves bridging external services (GitHub → Notion, webhook → database, API → storage)
# Patterns: concierge-orchestrator + cubby-state-machine (dedup)
# Models: Optional LLM for analysis/summarization

agentServicePubKey: "0x..."

engagements:
  - name: "Sync Orchestrator"
    description: "Receives events and syncs to external destination"
    file: ./engagements/orchestrator.ts
    version: "1.0.0"

agents:
  - name: "Analyzer"
    alias: "analyzer"
    description: "Analyzes incoming data and decides actions"
    version: "1.0.0"
    tasks:
      - name: "Analyze"
        alias: "analyze"
        file: ./agents/analyzer/tasks/analyze.ts
        parameters:
          properties:
            data:
              type: object
          required:
            - data
          type: object
        returns:
          properties:
            should_process:
              type: boolean
            summary:
              type: string
            category:
              type: string
          type: object

  - name: "Writer"
    alias: "writer"
    description: "Writes processed data to external destination"
    version: "1.0.0"
    tasks:
      - name: "Write"
        alias: "write"
        file: ./agents/writer/tasks/write.ts
        parameters:
          properties:
            destination_config:
              type: object
            record:
              type: object
          required:
            - record
          type: object
        returns:
          properties:
            success:
              type: boolean
            id:
              type: string
          type: object

cubbies:
  - name: "syncState"
    description: "Dedup store and sync state tracking"
    dataTypes:
      - json

workspaces:
  - name: "Data Sync"
    description: "Data synchronization workspace"
    streams:
      - name: "Incoming Events"
        description: "Events from external source"
        selectors:
          - name: "all"
            conditions:
              - "*"
        deployments:
          - name: "Sync Pipeline"
            description: "Process and sync events"
            engagement: "Sync Orchestrator"
            isActive: true
            triggers:
              - name: "all-events"
                conditions:
                  - "*"
